{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="glass-card rounded-xl p-8 border border-red-500/30">
        <div class="text-center mb-6">
            <div class="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-4 text-red-500">
                <span class="material-icons-round text-3xl">warning</span>
            </div>
            <h1 class="text-2xl font-bold text-white mb-2">Delete Account?</h1>
            <p class="text-slate-400">
                Are you sure you want to delete <span class="text-white font-bold">"{{ object.name }}"</span>?
                <br>
                This action cannot be undone and all associated transactions will be lost.
            </p>
        </div>

        <form method="post" class="flex flex-col gap-4">
            {% csrf_token %}
            <div class="flex gap-4">
                <a href="{% url 'manage_accounts' %}" class="flex-1 py-3 rounded-xl border border-slate-700 text-slate-300 font-medium hover:bg-slate-800 transition-colors text-center">
                    Cancel
                </a>
                <button type="submit" class="flex-1 py-3 rounded-xl bg-red-500 hover:bg-red-600 text-white font-bold transition-all shadow-lg shadow-red-500/20">
                    Delete
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
