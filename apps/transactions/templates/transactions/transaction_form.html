{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-140px)]">
    <div class="w-full max-w-lg glass-card rounded-xl shadow-2xl overflow-hidden relative">
        <div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-full blur-[60px] -mr-16 -mt-16 pointer-events-none"></div>

        <!-- Header -->
        <div class="px-8 pt-8 pb-4 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-white tracking-tight">{% if object %}Edit Transaction{% else %}New Transaction{% endif %}</h1>
            <a href="{% url 'dashboard' %}" class="text-slate-400 hover:text-white transition-colors">
                <span class="material-icons-round">close</span>
            </a>
        </div>

        <form method="post" class="px-8 pb-8 space-y-6">
            {% csrf_token %}
            {% if form.errors %}
            <div class="bg-red-500/10 border border-red-500/50 text-red-500 text-sm p-3 rounded-lg">
                {{ form.non_field_errors }}
            </div>
            {% endif %}

            <div class="space-y-4">
                <!-- Transaction Type Toggle -->
                <div class="grid grid-cols-2 gap-2 p-1 bg-slate-900/50 rounded-lg border border-slate-800">
                    <label class="cursor-pointer">
                        <input type="radio" name="type" value="EXPENSE" class="peer sr-only" {% if form.type.value == 'EXPENSE' or not form.type.value %}checked{% endif %}>
                        <div class="text-center py-2 rounded-md text-sm font-bold text-slate-400 peer-checked:bg-slate-800 peer-checked:text-white transition-all">
                            Expense
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="type" value="INCOME" class="peer sr-only" {% if form.type.value == 'INCOME' %}checked{% endif %}>
                        <div class="text-center py-2 rounded-md text-sm font-bold text-slate-400 peer-checked:bg-primary peer-checked:text-white transition-all">
                            Income
                        </div>
                    </label>
                </div>
                
                <!-- Amount -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-slate-400 ml-1">Amount</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-lg font-bold">$</span>
                        <input type="number" step="0.01" name="amount" class="w-full bg-slate-900/40 border border-slate-800 rounded-lg pl-8 pr-4 py-3 text-white text-lg font-bold focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all outline-none placeholder-slate-600" placeholder="0.00" value="{{ form.amount.value|default:'' }}" required>
                    </div>
                </div>

                <!-- Description -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-slate-400 ml-1">Description</label>
                    <input type="text" name="description" class="w-full bg-slate-900/40 border border-slate-800 rounded-lg px-4 py-3 text-white focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all outline-none placeholder-slate-600" placeholder="What is this for?" value="{{ form.description.value|default:'' }}" required>
                </div>

                <!-- Category & Account Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Category -->
                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-slate-400 ml-1">Category</label>
                        <div class="relative">
                            <select name="category" class="w-full bg-slate-900/40 border border-slate-800 rounded-lg px-4 py-3 text-white focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all outline-none appearance-none">
                                {% for choice in form.category.field.queryset %}
                                    <option value="{{ choice.id }}" {% if form.category.value|stringformat:"s" == choice.id|stringformat:"s" %}selected{% endif %}>{{ choice.name }}</option>
                                {% endfor %}
                            </select>
                            <span class="material-icons-round absolute right-3 top-3 text-slate-500 pointer-events-none">expand_more</span>
                        </div>
                    </div>

                    <!-- Account -->
                    <div class="space-y-2">
                        <label class="block text-sm font-medium text-slate-400 ml-1">Account</label>
                        <div class="relative">
                            <select name="account" class="w-full bg-slate-900/40 border border-slate-800 rounded-lg px-4 py-3 text-white focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all outline-none appearance-none">
                                {% for choice in form.account.field.queryset %}
                                    <option value="{{ choice.id }}" {% if form.account.value|stringformat:"s" == choice.id|stringformat:"s" %}selected{% endif %}>{{ choice.name }}</option>
                                {% endfor %}
                            </select>
                            <span class="material-icons-round absolute right-3 top-3 text-slate-500 pointer-events-none">expand_more</span>
                        </div>
                    </div>
                </div>

                <!-- Date -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-slate-400 ml-1">Date</label>
                    <input type="date" name="timestamp" class="w-full bg-slate-900/40 border border-slate-800 rounded-lg px-4 py-3 text-white focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all outline-none [color-scheme:dark]" value="{{ form.timestamp.value|date:'Y-m-d' }}">
                </div>
            </div>

            <!-- Submit -->
            <div class="pt-4">
                <button type="submit" class="w-full bg-primary hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl shadow-neon transition-all hover:translate-y-[-1px] active:translate-y-[1px]">
                    {% if object %}Save Transaction{% else %}Add Transaction{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
