{% extends 'custom_admin/base.html' %}

{% block title %}Confirm Delete{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto mt-12">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-lg text-center">
        <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="material-icons-round text-3xl text-red-500">warning</span>
        </div>
        
        <h1 class="text-2xl font-bold text-white mb-4">Delete Transaction?</h1>
        <p class="text-slate-400 mb-8 leading-relaxed">
            Are you sure you want to delete transaction <strong class="text-white">"{{ object }}"</strong>? 
            <br>This action cannot be undone.
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="flex items-center justify-center gap-4">
                <a href="{% url 'custom_admin:transaction_list' %}" class="px-6 py-3 rounded-xl border border-slate-700 text-slate-300 hover:text-white hover:bg-slate-800 font-medium transition-all">
                    Cancel
                </a>
                <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:shadow-red-500/25 transition-all flex items-center gap-2">
                    <span class="material-icons-round">delete_forever</span>
                    Confirm Delete
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
