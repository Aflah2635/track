{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="glass-card rounded-xl p-8 border border-red-500/30 shadow-2xl relative overflow-hidden">
        <!-- Background Glow -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-red-500/10 rounded-full blur-[60px] -mr-16 -mt-16 pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-6 text-red-500 ring-1 ring-red-500/30 shadow-[0_0_20px_rgba(239,68,68,0.2)]">
                <span class="material-icons-round text-3xl">warning</span>
            </div>
            <h1 class="text-2xl font-bold text-white mb-3">Delete Account?</h1>
            <p class="text-slate-400">
                Are you sure you want to delete <span class="text-white font-bold bg-slate-800 px-2 py-0.5 rounded border border-slate-700">{{ object.name }}</span>?
            </p>
            <p class="text-slate-500 text-sm mt-3">
                This action cannot be undone. All transactions associated with this account will be <span class="text-red-400 font-medium">permanently deleted</span>.
            </p>
        </div>

        <form method="post" class="flex flex-col gap-4 relative z-10">
            {% csrf_token %}
            <div class="flex gap-4">
                <a href="{% url 'manage_accounts' %}" class="flex-1 py-3 rounded-xl border border-slate-700 text-slate-300 font-medium hover:bg-slate-800 hover:text-white transition-all text-center">
                    Cancel
                </a>
                <button type="submit" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 text-white font-bold transition-all shadow-lg shadow-red-500/25 active:scale-[0.98]">
                    Yes, Delete
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
