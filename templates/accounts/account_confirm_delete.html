{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 4rem auto; text-align: center;">
    <h2 class="text-danger mb-4">Delete Account?</h2>
    <p>Are you sure you want to delete the account <strong>"{{ object.name }}"</strong>?</p>
    <p class="text-muted">This action cannot be undone. All transactions associated with this account will be
        permanently deleted.</p>

    <form method="post" style="margin-top: 2rem;">
        {% csrf_token %}
        <div class="actions center" style="justify-content: center; gap: 1rem;">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'manage_accounts' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
