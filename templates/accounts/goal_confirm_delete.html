{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-140px)]">
    <div class="w-full max-w-md glass-card rounded-xl shadow-2xl overflow-hidden relative border border-red-500/20">
        <div class="absolute top-0 right-0 w-32 h-32 bg-red-500/10 rounded-full blur-[60px] -mr-16 -mt-16 pointer-events-none"></div>

        <div class="p-8 text-center text-white">
            <div class="w-16 h-16 rounded-full bg-red-500/20 text-red-500 flex items-center justify-center mx-auto mb-6 shadow-neon-red">
                <span class="material-icons-round text-3xl">delete_forever</span>
            </div>
            
            <h1 class="text-2xl font-bold mb-2">Delete Goal?</h1>
            <p class="text-slate-400 mb-8 leading-relaxed">
                Are you sure you want to delete the goal <strong class="text-white">{{ object.name }}</strong>? This action cannot be undone.
            </p>
            
            <form method="post" class="space-y-3">
                {% csrf_token %}
                <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-lg shadow-neon-red hover:shadow-[0_0_20px_rgba(239,68,68,0.6)] transition-all">
                    Yes, Delete Goal
                </button>
                <a href="{% url 'dashboard' %}" class="block w-full text-center py-3 px-4 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-lg border border-slate-700 transition-colors">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
