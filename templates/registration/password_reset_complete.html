{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen flex items-center justify-center relative overflow-hidden">
    <div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>

    <main class="w-full max-w-[440px] z-10 p-6">
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-2 mb-4">
                <div class="w-12 h-12 bg-green-500/10 border border-green-500/20 rounded-full flex items-center justify-center">
                    <span class="material-icons text-green-500 text-2xl">check_circle</span>
                </div>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Password Reset Complete</h1>
        </div>

        <div class="glass-card rounded-xl p-8 shadow-2xl text-center">
            <p class="text-slate-600 dark:text-slate-300 mb-8">
                Your password has been set successfully. You may go ahead and log in now.
            </p>

            <a href="{% url 'login' %}" class="inline-block w-full py-3.5 bg-primary text-white font-bold rounded-lg neon-shadow transform transition-all active:scale-[0.98] duration-200">
                Sign In
            </a>
        </div>
    </main>
</div>
{% endblock %}
